name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (no autofix)
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Unit + E2E tests with coverage
        run: npm run test:cov

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage
          path: coverage/
          retention-days: 14
